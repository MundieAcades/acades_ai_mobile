name: acades_ai
description: Acades AI - Agricultural AI Chat Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Assets
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # Local Storage & Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  shared_preferences: ^2.2.2
  
  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.4.0
  
  # Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  flutter_image_compress: ^2.1.0
  
  # Utilities
  path_provider: ^2.1.2
  intl: ^0.18.1
  
  # Backend & APIs
  supabase_flutter: ^2.5.0
  http: ^1.1.0
  
  # Networking & Serialization
  dio: ^5.4.0
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  
  # Logging & Error Handling
  logger: ^2.0.1
  sentry_flutter: ^7.8.0
  
  # Configuration
  flutter_dotenv: ^5.1.0
  
  # Date & Time
  timezone: ^0.9.2
  
  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
    - .env.example
