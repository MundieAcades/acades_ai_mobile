name: acades_ai
description: Acades AI - Agricultural AI Chat Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.2
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
